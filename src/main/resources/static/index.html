<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园王</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="app-shell lobby-shell">
    <header class="topbar lobby-topbar">
        <div class="brand">
            <img class="brand-title-image" src="images/ui/title.png" alt="校园王">
            <div class="title sr-only">校园王</div>
            <div class="subtitle">创建对局、加入房间，或查看卡牌大全</div>
        </div>
        <nav class="page-nav">
            <a class="nav-link active" href="index.html">大厅</a>
            <a class="nav-link" href="cards.html">卡牌大全</a>
            <a class="nav-link" href="battle.html">进入对局</a>
        </nav>
    </header>

    <section class="lobby-hero panel">
        <div>
            <p class="eyebrow">Campus King</p>
            <h1>先建房，再进对局页。</h1>
            <p class="hero-copy">创建或加入成功后会自动跳转到 battle.html；刷新对局页会从本地会话恢复身份。</p>
        </div>
        <div class="lobby-actions">
            <a class="button-link alt" href="cards.html">查看卡牌大全</a>
            <a class="button-link" href="battle.html">继续上次对局</a>
        </div>
    </section>

    <section class="lobby-grid">
        <form class="lobby-card panel" id="createRoomForm">
            <div>
                <p class="eyebrow">Create</p>
                <h2>创建房间</h2>
            </div>
            <label for="playerName">你的名字</label>
            <input id="playerName" autocomplete="nickname" placeholder="输入名字">
            <label class="checkbox-row">
                <input id="botModeInput" type="checkbox">
                <span>创建人机模式房间</span>
            </label>
            <button id="createRoomBtn" type="submit">创建并进入对局</button>
        </form>

        <form class="lobby-card panel" id="joinRoomForm">
            <div>
                <p class="eyebrow">Join</p>
                <h2>加入房间</h2>
            </div>
            <label for="joinPlayerName">你的名字</label>
            <input id="joinPlayerName" autocomplete="nickname" placeholder="输入名字">
            <label for="roomCodeInput">房间码</label>
            <input id="roomCodeInput" autocomplete="off" placeholder="输入房主给你的房间码">
            <button id="joinRoomBtn" type="submit">加入并进入对局</button>
        </form>
    </section>

    <section class="lobby-status panel">
        <span id="connectionInfo">未加入房间</span>
        <span id="roomCodeText">------</span>
        <button class="alt" id="copyRoomBtn" type="button">复制当前房间码</button>
    </section>
</main>

<script src="toast.js"></script>
<script src="lobby.js?v=20260530-1"></script>
</body>
</html>
